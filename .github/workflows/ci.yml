name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend - build & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn test
        run: mvn -B test

      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/*/target/surefire-reports/

  backend-sonar:
    name: Backend - SonarCloud
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarCloud necesita el historial completo para el analisis de PRs

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache de SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: mvn verify + analisis SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=danieldelgadomora_fleet-telemetry-platform
          -Dsonar.organization=danieldelgadomora
          -Dsonar.host.url=https://sonarcloud.io

  frontend-build:
    name: Frontend - build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: ng build
        run: npm run build

  docker-build:
    name: Docker - build de todas las imagenes
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: docker compose build
        run: docker compose build

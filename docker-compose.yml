name: fleet-telemetry-platform

services:
  postgres:
    image: postgres:16
    container_name: fleet-postgres
    environment:
      POSTGRES_DB: fleet_telemetry
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_telemetry"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: fleet-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fleet-rabbitmq
    ports:
      - "5672:5672"   # protocolo AMQP (lo usan los microservicios)
      - "15672:15672" # UI de administracion: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingestion-service:
    build:
      context: ./backend
      dockerfile: ingestion-service/Dockerfile
    container_name: fleet-ingestion-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/fleet_telemetry
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      APP_CORS_ALLOWED_ORIGIN: http://localhost:4200
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  alerting-service:
    build:
      context: ./backend
      dockerfile: alerting-service/Dockerfile
    container_name: fleet-alerting-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fleet_telemetry
      SPRING_DATASOURCE_USERNAME: fleet
      SPRING_DATASOURCE_PASSWORD: fleet
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Sin healthcheck HTTP: alerting-service es 100% event-driven, no expone /actuator/health
    # por HTTP (ver Dockerfile).

  fleet-gateway-service:
    build:
      context: ./backend
      dockerfile: fleet-gateway-service/Dockerfile
    container_name: fleet-gateway-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fleet_telemetry
      SPRING_DATASOURCE_USERNAME: fleet
      SPRING_DATASOURCE_PASSWORD: fleet
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      APP_CORS_ALLOWED_ORIGIN: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleet-frontend
    ports:
      - "4200:80"
    depends_on:
      fleet-gateway-service:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: fleet-simulator
    profiles: ["simulator"]
    command:
      - "--vehicles"
      - "5"
      - "--stopped-vehicles"
      - "1"
      - "--duration-seconds"
      - "120"
      - "--seed"
      - "42"
      - "--ingestion-url"
      - "http://ingestion-service:8081/api/v1/telemetry"
    depends_on:
      ingestion-service:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:

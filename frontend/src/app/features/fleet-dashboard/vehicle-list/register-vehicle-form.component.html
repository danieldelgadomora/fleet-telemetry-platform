<h2 mat-dialog-title>Registrar vehículo</h2>
<form [formGroup]="form" (ngSubmit)="registrar()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="register-form__field">
      <mat-label>Id del vehículo</mat-label>
      <input matInput formControlName="vehicleId" placeholder="ej. v1" />
      @if (form.controls.vehicleId.invalid && form.controls.vehicleId.touched) {
        <mat-error>Ingresa un id válido, sin espacios.</mat-error>
      }
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-flat-button color="primary" type="submit">
      <mat-icon>add</mat-icon>
      Registrar
    </button>
  </mat-dialog-actions>
</form>
